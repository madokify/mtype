<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — mtype</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #313338;
    --bg-light: #3a3d42;
    --bg-lighter: #43464c;
    --accent: #e2b714;
    --white: #ffffff;
  }

  body {
    background: var(--bg);
    font-family: 'Roboto Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    height: 56px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    background: rgba(49,51,56,0.95);
    backdrop-filter: blur(8px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .nav-left { display: flex; gap: 0.25rem; }
  .nav-right { display: flex; gap: 0.25rem; }

  nav a {
    color: rgba(255,255,255,0.6);
    text-decoration: none;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s;
    cursor: pointer;
  }

  nav a:hover {
    color: var(--white);
    background: rgba(255,255,255,0.06);
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem 1.5rem;
    gap: 0;
  }

  .title-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 2rem;
  }

  .title {
    font-size: clamp(3.5rem, 10vw, 6rem);
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.02em;
    line-height: 1;
    display: inline-block;
  }

  .title-underline {
    display: block;
    height: 3px;
    margin-top: 6px;
    background: linear-gradient(to right, var(--accent) 0%, var(--accent) 40%, transparent 100%);
    border-radius: 2px;
    width: 100%;
  }

  .subtitle {
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    text-align: center;
    margin-bottom: 2rem;
  }

  .home-btn {
    background: var(--bg-light);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--accent);
    font-family: 'Roboto Mono', monospace;
    font-size: 14px;
    padding: 10px 24px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    letter-spacing: 0.02em;
    text-decoration: none;
    display: inline-block;
  }

  .home-btn:hover {
    background: var(--bg-lighter);
    border-color: rgba(255,255,255,0.15);
  }
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <a href="/">Home</a>
    <a href="https://mtgoals.cc" target="_blank">Monkeytype Goals</a>
  </div>
  <div class="nav-right">
    <a href="https://github.com/konatify/mtype" target="_blank">GitHub</a>
  </div>
</nav>

<main>
  <div class="title-wrap">
    <span class="title">mtype</span>
    <span class="title-underline"></span>
  </div>

  <p class="subtitle">You've made a wrong turn.</p>

  <a class="home-btn" href="/">Go Home?</a>
</main>

</body>
</html>
